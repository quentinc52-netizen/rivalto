<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Rivalto — Athletic League</title>
<meta name="theme-color" content="#08090c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rivalto">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#08090c; --surface:#0f1117; --surface2:#161922; --surface3:#1c2030;
  --line:#222738; --line2:#2c3346;
  --green:#00ff95; --green-dim:#00cf79; --green-glow:rgba(0,255,149,.35);
  --magenta:#ff2e97; --cyan:#2de2ff; --gold:#ffd23f; --violet:#b14aff; --strava:#fc4c02;
  --txt:#eef2f8; --txt2:#8a93a8; --txt3:#565d72;
  --r:14px; --r-sm:10px; --r-lg:20px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:'Exo 2',system-ui,sans-serif;font-weight:400;
  overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.mono,.num{font-family:'Orbitron',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
a{color:inherit;text-decoration:none}

.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(var(--line) .5px,transparent .5px),linear-gradient(90deg,var(--line) .5px,transparent .5px);
  background-size:38px 38px;
  -webkit-mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 5%,transparent 70%);
  mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 5%,transparent 70%);}

/* LOGIN */
.login{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
.login .ring{width:128px;height:128px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:30px;box-shadow:0 0 40px var(--green-glow),inset 0 0 30px rgba(0,255,149,.08)}
.login .ring::after{content:"";position:absolute;inset:9px;border-radius:50%;border:.5px solid rgba(0,255,149,.25)}
.login .ring svg{filter:drop-shadow(0 0 8px var(--green-glow))}
.brand{font-family:'Orbitron';font-weight:900;font-size:40px;letter-spacing:6px;line-height:1}
.brand b{color:var(--green)}
.tagline{font-size:11px;letter-spacing:5px;color:var(--txt3);margin-top:12px;text-transform:uppercase}
.login .pitch{font-size:18px;color:var(--txt2);margin:38px 0 30px;max-width:300px;line-height:1.5;font-weight:300}
.login .pitch b{color:var(--txt);font-weight:600}
.btn-strava{width:100%;max-width:320px;background:var(--strava);color:#fff;font-weight:600;font-size:16px;padding:16px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 24px rgba(252,76,2,.3);transition:transform .15s}
.btn-strava:active{transform:scale(.97)}
.login .note{font-size:12px;color:var(--txt3);margin-top:18px;display:flex;align-items:center;gap:6px;justify-content:center}

/* SHELL */
.app-view{position:relative;z-index:1;display:none;flex-direction:column;min-height:100vh;padding-bottom:104px}
.app-view.on{display:flex}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:max(14px,env(safe-area-inset-top)) 20px 12px;background:linear-gradient(180deg,var(--bg) 60%,transparent);backdrop-filter:blur(8px)}
.topbar .logo{font-family:'Orbitron';font-weight:900;font-size:21px;letter-spacing:3px}
.topbar .logo b{color:var(--green)}
.topbar .logo i{color:var(--green);margin-right:7px;vertical-align:-1px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:700;flex-shrink:0;overflow:hidden}
.topbar .av{width:38px;height:38px;font-size:13px;border:1.5px solid currentColor}
.screen{display:none;animation:fade .35s ease;padding:0 16px 8px}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 4px 14px;scrollbar-width:none}
.chip{padding:8px 16px;border-radius:30px;border:.5px solid var(--line2);background:var(--surface);color:var(--txt3);font-size:13px;white-space:nowrap;transition:all .18s;font-weight:500}
.chip.on{background:var(--green);color:#04140d;border-color:var(--green);font-weight:700;box-shadow:0 0 16px var(--green-glow)}
.seg{display:flex;gap:6px;padding:0 4px 16px}
.seg .chip{flex:1;text-align:center;padding:8px 4px}
.eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin:14px 8px 10px;font-weight:600}
.eyebrow:first-child{margin-top:4px}

.card{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r);padding:16px}
.act{display:flex;align-items:center;gap:13px;margin-bottom:10px;transition:transform .15s,border-color .2s}
.act:active{transform:scale(.985)}
.act .ico{width:46px;height:46px;border-radius:12px;background:var(--surface2);border:.5px solid rgba(0,255,149,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green)}
.act .mid{flex:1;min-width:0}
.act .nm{font-size:15px;font-weight:600;margin-bottom:3px}
.act .sub{font-size:12px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act .rgt{text-align:right;flex-shrink:0}
.act .big{font-family:'Orbitron';font-weight:700;font-size:17px;color:var(--green)}
.act .tm{font-size:11px;color:var(--txt3);margin-top:2px}

.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mgrid.three{grid-template-columns:repeat(3,1fr)}
.metric{background:var(--surface2);border:.5px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.metric .v{font-family:'Orbitron';font-weight:700;font-size:22px;color:var(--green);line-height:1.05}
.metric .v.sm{font-size:18px}
.metric .v small{font-size:11px;color:var(--txt3);font-family:'Exo 2';font-weight:500;margin-left:2px}
.metric .l{font-size:11px;color:var(--txt3);margin-top:5px}
.metric.alt .v{color:var(--cyan)} .metric.alt2 .v{color:var(--magenta)}

.hero-msg{background:linear-gradient(135deg,var(--surface2),var(--surface));border:.5px solid rgba(0,255,149,.25);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;margin-bottom:14px}
.hero-msg::before{content:"";position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,var(--green-glow),transparent 70%);pointer-events:none}
.hero-msg .greet{font-size:12px;color:var(--green);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.hero-msg .txt{font-size:17px;line-height:1.45}
.hero-msg .txt b{color:var(--green);font-weight:700}
.prog-line{display:flex;align-items:center;gap:9px;font-size:14px;padding:13px 16px;border-radius:var(--r);background:var(--surface);border:.5px solid var(--line);margin:0 4px 16px}
.prog-line.up{border-color:rgba(0,255,149,.3)} .prog-line.up .pi{color:var(--green)}
.prog-line.down{border-color:rgba(255,46,151,.3)} .prog-line.down .pi{color:var(--magenta)}
.prog-line.flat .pi{color:var(--txt3)}

.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 4px}
.badge{background:var(--surface2);border:.5px solid var(--line);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.badge.earned{border-color:rgba(0,255,149,.4);box-shadow:0 0 20px rgba(0,255,149,.08)}
.badge.earned::after{content:"";position:absolute;top:-30px;right:-30px;width:80px;height:80px;background:radial-gradient(circle,var(--green-glow),transparent 70%)}
.badge .bi{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--surface3);color:var(--txt3)}
.badge.earned .bi{background:rgba(0,255,149,.12);color:var(--green)}
.badge .bn{font-size:13px;font-weight:700}
.badge.earned .bn{color:var(--green)}
.badge .bd{font-size:11px;color:var(--txt3);line-height:1.35}
.badge .lock{position:absolute;top:12px;right:12px;color:var(--txt3)}

/* RANKING */
.rank-banner{display:flex;align-items:center;gap:10px;margin:2px 4px 14px;padding:11px 15px;border-radius:var(--r);background:linear-gradient(120deg,rgba(0,255,149,.1),rgba(45,226,255,.05));border:.5px solid rgba(0,255,149,.25)}
.rank-banner .rbi{color:var(--green)}
.rank-banner .rbt{font-size:13px;color:var(--txt2)}
.rank-banner .rbt b{color:var(--txt);font-weight:600}
.rank-head{display:flex;align-items:center;justify-content:space-between;padding:0 6px 12px}
.rank-head .sel{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:6px}
.icobtn{width:38px;height:38px;border-radius:11px;border:.5px solid var(--line2);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--txt2);transition:all .18s}
.icobtn:active{transform:scale(.92);color:var(--green);border-color:var(--green)}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:6px 0 18px;padding:0 4px}
.pod{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative}
.pod .pav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:700;position:relative;margin-bottom:8px}
.pod.p1 .pav{width:72px;height:72px;font-size:22px;border:2px solid var(--gold);box-shadow:0 0 26px rgba(255,210,63,.4);animation:pulse 2.4s ease-in-out infinite}
.pod.p2 .pav{width:58px;height:58px;font-size:18px;border:2px solid #c8d6e6}
.pod.p3 .pav{width:58px;height:58px;font-size:18px;border:2px solid var(--strava)}
@keyframes pulse{0%,100%{box-shadow:0 0 22px rgba(255,210,63,.32)}50%{box-shadow:0 0 36px rgba(255,210,63,.6)}}
.pod .crown{position:absolute;top:-20px;left:50%;transform:translateX(-50%);color:var(--gold);filter:drop-shadow(0 0 6px rgba(255,210,63,.6))}
.pod .pn{font-size:12px;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod .pv{font-family:'Orbitron';font-weight:700;font-size:14px;margin-top:2px}
.pod.p1 .pv{color:var(--gold)} .pod.p2 .pv{color:#c8d6e6} .pod.p3 .pv{color:var(--strava)}
.pod .medal{position:absolute;bottom:-5px;right:-5px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:900}
.pod.p1 .medal{width:24px;height:24px;background:var(--gold);color:#3a2c00;font-size:12px;bottom:-6px;right:-6px}
.pod.p2 .medal{width:20px;height:20px;background:#c8d6e6;color:#1a222e;font-size:11px}
.pod.p3 .medal{width:20px;height:20px;background:var(--strava);color:#fff;font-size:11px}
#ranklist{position:relative}
.rrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:.5px solid var(--line);border-radius:var(--r);padding:11px 14px;margin-bottom:8px;will-change:transform}
.rrow.me{border-color:var(--violet);background:linear-gradient(90deg,rgba(177,74,255,.12),var(--surface) 60%);box-shadow:0 0 18px rgba(177,74,255,.18)}
.rrow.top{border-color:rgba(255,210,63,.3)}
.rrow .rn{font-family:'Orbitron';font-weight:900;font-size:16px;color:var(--txt3);width:26px;text-align:center;flex-shrink:0}
.rrow.me .rn{color:var(--violet)}
.rrow .ra{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:700;font-size:12px;flex-shrink:0}
.rrow .rmid{flex:1;min-width:0}
.rrow .rname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.rrow .bar{height:4px;background:var(--surface3);border-radius:3px;margin-top:7px;overflow:hidden}
.rrow .bar i{display:block;height:100%;border-radius:3px;background:var(--green);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.rrow .rval{font-family:'Orbitron';font-weight:700;font-size:15px;color:var(--green);flex-shrink:0;text-align:right}
.rrow.me .rval{color:var(--violet)}
.delta{font-size:10px;font-family:'Orbitron';font-weight:700;padding:1px 5px;border-radius:20px;display:inline-flex;align-items:center;gap:1px}
.delta.up{color:var(--green);background:rgba(0,255,149,.12)}
.delta.down{color:var(--magenta);background:rgba(255,46,151,.12)}
.flash{animation:flash 1s ease}
@keyframes flash{0%{background-color:rgba(0,255,149,.18)}100%{}}
.you-pill{font-size:9px;font-family:'Orbitron';font-weight:700;color:var(--violet);border:.5px solid var(--violet);padding:1px 6px;border-radius:20px;letter-spacing:.5px}

.frow{display:flex;align-items:center;gap:13px;background:var(--surface);border:.5px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:9px;transition:transform .15s}
.frow:active{transform:scale(.985)}
.frow .fa{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:700;font-size:14px;flex-shrink:0}
.frow .fmid{flex:1;min-width:0}
.frow .fn{font-size:15px;font-weight:600}
.frow .fs{font-size:12px;color:var(--txt3);margin-top:2px}
.frow .fb{font-family:'Orbitron';font-weight:700;font-size:12px;color:var(--green);background:rgba(0,255,149,.1);border:.5px solid rgba(0,255,149,.25);padding:5px 10px;border-radius:20px;flex-shrink:0}
.btn-out{width:100%;border:1px solid rgba(0,255,149,.45);color:var(--green);border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:14px;transition:all .18s}
.btn-out:active{background:rgba(0,255,149,.08);transform:scale(.99)}

/* TABBAR — Classement central surélevé */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;max-width:480px;margin:0 auto;display:flex;align-items:flex-end;
  background:rgba(10,11,15,.92);backdrop-filter:blur(14px);border-top:.5px solid var(--line);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));overflow:visible}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px;color:var(--txt3);transition:color .2s}
.tab.on{color:var(--green)}
.tab svg{display:block}
.tab .tl{font-size:10px;font-weight:600;letter-spacing:.3px}
.tab.center{margin-top:-30px;gap:7px}
.tab.center .cwrap{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 32%,#19ffa6,#00b368);color:#04140d;border:3px solid var(--bg);
  box-shadow:0 0 22px rgba(0,255,149,.5),0 10px 22px rgba(0,0,0,.55);animation:beat 2.1s ease-in-out infinite}
@keyframes beat{0%,100%{box-shadow:0 0 18px rgba(0,255,149,.42),0 10px 22px rgba(0,0,0,.55)}50%{box-shadow:0 0 36px rgba(0,255,149,.85),0 10px 22px rgba(0,0,0,.55)}}
.tab.center .tl{color:var(--green);font-weight:700;font-size:11px}
.tab.center.on .cwrap{background:radial-gradient(circle at 50% 32%,#3dffb4,#00c878)}

/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:60;background:var(--bg);max-width:480px;margin:0 auto;overflow-y:auto;display:none;animation:slideup .3s cubic-bezier(.2,.8,.2,1);padding-bottom:40px}
.overlay.on{display:block}
@keyframes slideup{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.ov-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:max(14px,env(safe-area-inset-top)) 18px 12px;background:linear-gradient(180deg,var(--bg) 70%,transparent);backdrop-filter:blur(8px)}
.ov-bar .back{width:40px;height:40px;border-radius:50%;border:.5px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--txt);flex-shrink:0}
.ov-bar .ti{flex:1;font-size:17px;font-weight:700}
.ov-bar .ti small{display:block;font-size:11px;color:var(--txt3);font-weight:400;margin-top:1px}

/* MAP */
.map{height:210px;border-radius:var(--r);border:.5px solid var(--line);overflow:hidden;position:relative;background:#0a0d12}
.map .leaflet-container{background:#0a0d12;font-family:'Exo 2'}
.map .ploc{position:absolute;top:10px;left:12px;z-index:500;font-size:11px;letter-spacing:.5px;color:var(--green);background:rgba(8,9,12,.78);border:.5px solid rgba(0,255,149,.3);padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;font-weight:600}
.map .pgps{position:absolute;bottom:8px;right:10px;z-index:500;font-size:9px;letter-spacing:1px;color:var(--txt3);font-family:'Orbitron'}
.leaflet-interactive.rl{filter:drop-shadow(0 0 5px rgba(0,255,149,.8))}
.gmaps-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding:11px;border-radius:var(--r);border:.5px solid var(--line2);background:var(--surface);color:var(--txt2);font-size:13px;font-weight:600}
.gmaps-link:active{border-color:var(--green);color:var(--green)}
.svgmap{height:210px;border-radius:var(--r);border:.5px solid var(--line);overflow:hidden;position:relative;background:radial-gradient(ellipse at 50% 50%,#0d1018,#070809)}
.svgmap .gl{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,149,.06) .5px,transparent .5px),linear-gradient(90deg,rgba(0,255,149,.06) .5px,transparent .5px);background-size:26px 26px}
.chart-box{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r);padding:14px 12px 8px;margin-top:12px}
.chart-box .ct{font-size:12px;color:var(--txt2);font-weight:600;margin:0 4px 6px;display:flex;justify-content:space-between}
.chart-box .ct span{color:var(--green);font-family:'Orbitron';font-weight:700}

/* SHEET */
.sheet-bg{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;animation:fade .25s}
.sheet-bg.on{display:flex}
.sheet{width:100%;max-width:480px;background:var(--surface);border-top:.5px solid var(--line2);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:8px 20px calc(28px + env(safe-area-inset-bottom));animation:slideup .3s cubic-bezier(.2,.8,.2,1);max-height:86vh;overflow-y:auto}
.sheet .grip{width:40px;height:4px;border-radius:3px;background:var(--line2);margin:8px auto 18px}
.sheet h3{font-size:18px;font-weight:700;margin-bottom:4px}
.sheet p.s{font-size:13px;color:var(--txt3);margin-bottom:18px}
.linkbox{display:flex;gap:8px;background:var(--surface2);border:.5px solid var(--line);border-radius:var(--r);padding:6px 6px 6px 14px;align-items:center;margin-bottom:8px}
.linkbox input{flex:1;background:none;border:none;color:var(--txt2);font-size:13px;outline:none}
.linkbox button{background:var(--green);color:#04140d;font-weight:700;padding:9px 14px;border-radius:var(--r-sm);font-size:13px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;color:var(--txt3);font-size:11px;margin:18px 0;text-transform:uppercase;letter-spacing:1px}
.divider::before,.divider::after{content:"";flex:1;height:.5px;background:var(--line)}
.searchbox{display:flex;gap:8px;background:var(--surface2);border:.5px solid var(--line2);border-radius:var(--r);padding:11px 14px;align-items:center;margin-bottom:12px}
.searchbox input{flex:1;background:none;border:none;color:var(--txt);font-size:14px;outline:none}
.searchbox i{color:var(--txt3)}
.sugg{display:flex;align-items:center;gap:12px;padding:10px 4px}
.sugg .sa{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:700;font-size:13px;flex-shrink:0}
.sugg .smid{flex:1}
.sugg .sn{font-size:14px;font-weight:600}
.sugg .ss{font-size:12px;color:var(--txt3)}

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------- périodes (fenêtres glissantes) ---------- */
const SPAN={jour:DAY,semaine:7*DAY,mois:30*DAY,annee:365*DAY};
function startOf(period){return Date.now()-SPAN[period];}
function prevRange(period){const now=Date.now(),sp=SPAN[period];return[now-2*sp,now-sp];}

/* ---------- génération ---------- */
function genMetrics(sport,rnd,pf){
  const S=SPORTS[sport];let dist=0,dur,speed=0,maxSp=0,elev=0;
  if(S.dist){speed=rr(rnd,S.sp[0],S.sp[1])*(.9+pf.it*.1);dist=rr(rnd,S.d[0],S.d[1])*pf.vol;dur=dist/speed*3600;
    maxSp=speed*rr(rnd,1.2,1.5);elev=S.elev?Math.round(rr(rnd,S.el[0],S.el[1])*pf.el):0;}
  else{dur=rr(rnd,28,75)*60;}
  const hours=dur/3600;const cal=Math.round(S.met*WEIGHT*hours*pf.it);
  const hr=Math.round(rr(rnd,118,176)*(.92+pf.it*.06));
  return{sport,dist:+dist.toFixed(2),dur:Math.round(dur),speed:+speed.toFixed(1),maxSp:+maxSp.toFixed(1),elev,cal,hr};
}
function genAthlete(a){
  const rnd=mulberry32(a.seed*131+9);const acts=[];const now=Date.now();
  for(let d=0;d<760;d++){
    if(rnd()<a.pf.freq){const sport=pick(a.pf.sp,rnd);const m=genMetrics(sport,rnd,a.pf);
      const ts=now-d*DAY-rr(rnd,2,22)*36e5;const date=new Date(ts);
      acts.push({...m,id:a.id+'_'+d,ts,date,rseed:a.seed*1000+d});}
  }
  if(a.id==='me'){
    const inj=(hoursAgo,sport)=>{const ts=Date.now()-hoursAgo*36e5;const dt=new Date(ts);
      const m=genMetrics(sport,mulberry32(a.seed*7+hoursAgo),a.pf);
      acts.push({...m,id:'me_inj'+hoursAgo,ts,date:dt,rseed:a.seed*99+hoursAgo});};
    inj(3,'run'); inj(8,'workout'); inj(28,'ride'); inj(70,'trail'); inj(110,'hike');
  }
  acts.sort((x,y)=>y.ts-x.ts);return acts;
}

/* ---------- agrégation ---------- */
function aggregate(acts,fromTs,toTs,sport){
  let km=0,cal=0,dur=0,elev=0,sessions=0,longest=0,maxSp=0;const days=new Set();let bestPace=Infinity;const byS={};
  for(const ac of acts){
    if(ac.ts<fromTs||ac.ts>=toTs)continue;
    if(sport&&sport!=='all'&&ac.sport!==sport)continue;
    sessions++;km+=ac.dist;cal+=ac.cal;dur+=ac.dur;elev+=ac.elev;
    if(ac.dur>longest)longest=ac.dur;if(ac.maxSp>maxSp)maxSp=ac.maxSp;
    days.add(new Date(ac.ts).toDateString());byS[ac.sport]=(byS[ac.sport]||0)+1;
    if((ac.sport==='run'||ac.sport==='trail')&&ac.speed>0){const p=60/ac.speed;if(p<bestPace)bestPace=p;}
  }
  return{km:+km.toFixed(1),cal:Math.round(cal),dur,elev:Math.round(elev),sessions,activeDays:days.size,
    longest,maxSp:+maxSp.toFixed(1),bestPace,sports:Object.keys(byS).length,
    favSport:Object.entries(byS).sort((a,b)=>b[1]-a[1])[0]?.[0]||null,
    effortScore:+(dur/60*(Math.max(100,Math.round((118+cal/Math.max(1,sessions/10)))/100))).toFixed(0)};
}
function hasDouble(acts){const byDay={};for(const a of acts){const k=new Date(a.ts).toDateString();byDay[k]=(byDay[k]||0)+1;if(byDay[k]>=2)return true;}return false;}
function maxStreak(acts){if(!acts.length)return 0;const ds=[...new Set(acts.map(a=>new Date(a.ts).setHours(0,0,0,0)))].sort((x,y)=>x-y);
  let mx=1,cur=1;for(let i=1;i<ds.length;i++){const gap=Math.round((ds[i]-ds[i-1])/DAY);if(gap===1){cur++;mx=Math.max(mx,cur);}else cur=1;}return mx;}

/* ---------- formatage ---------- */
function fmtDur(s){const h=Math.floor(s/3600),m=Math.round(s%3600/60);return h?`${h}h${String(m).padStart(2,'0')}`:`${m} min`;}

function fmtPace(p){if(!isFinite(p))return'—';const m=Math.floor(p),s=Math.round((p-m)*60);return`${m}'${String(s).padStart(2,'0')}"`;}
function fmtDate(d){return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}

];
const LEAD_BADGES=BADGES.filter(b=>b.type==='lead');
const SELF_BADGES=BADGES.filter(b=>b.type==='self');
function earnedBadges(id,period){
  const from=startOf(period),now=Date.now();const group=['me',...friendIds];
  const aggs={},actsP={};
  group.forEach(g=>{aggs[g]=aggregate(DATA[g].acts,from,now,'all');actsP[g]=DATA[g].acts.filter(x=>x.ts>=from&&x.ts<now);});
  const out=[];
  for(const b of BADGES){
    if(b.type==='lead'){let bi=null,best=-1;for(const g of group){const v=b.crit(aggs[g]);if(v>best){best=v;bi=g;}}if(bi===id&&best>0)out.push(b.id);}
    else{if(b.test(aggs[id],actsP[id],period))out.push(b.id);}
  }
  return out;
}

/* ============================================================ ONGLET ACTIVITÉ (hub fusionné) */
function progressInfo(period){
  const now=Date.now();const cur=aggregate(DATA.me.acts,startOf(period),now,'all');
  const[pf,pt]=prevRange(period);const prev=aggregate(DATA.me.acts,pf,pt,'all');
  const dk=+(cur.km-prev.km).toFixed(1);
  if(prev.km===0&&cur.km===0)return{txt:"Pas encore de quoi comparer sur cette période.",cls:'flat',ic:'trend'};
  if(prev.km===0)return{txt:`Nouveau départ — ${cur.km} km déjà au compteur 💪`,cls:'up',ic:'up'};
  if(dk>1)return{txt:`En hausse : <b>+${dk} km</b> par rapport à ${prevLabel(period)} 🔥`,cls:'up',ic:'up'};
  if(dk<-1)return{txt:`En baisse : <b>${dk} km</b> vs ${prevLabel(period)}. On se rattrape ?`,cls:'down',ic:'down'};
  return{txt:`Tu tiens le rythme de ${prevLabel(period)}.`,cls:'flat',ic:'trend'};
}
function weeklyTrend(){
  const me=DATA.me.acts;const now=Date.now();const weeks=[];
  for(let w=7;w>=0;w--){const e=now-w*7*DAY,s=e-7*DAY;
    const km=me.filter(a=>a.ts>=s&&a.ts<e).reduce((t,a)=>t+a.dist,0);
    weeks.push({km:+km.toFixed(1),cur:w===0});}
  return weeks;
}
function trendChart(){
  const w=weeklyTrend();const max=Math.max(...w.map(x=>x.km),1);
  return `<div class="card" style="margin:0 4px 16px;padding:16px 14px 12px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin:0 2px 12px">
      <span style="font-size:12px;color:var(--txt2);font-weight:600;display:flex;align-items:center;gap:7px"><span style="color:var(--green)">${ic('trend',15,2.2)}</span>Ta forme — 8 dernières semaines</span>
      <span style="font-family:'Orbitron';font-weight:700;font-size:13px;color:var(--green)">${w[w.length-1].km} km</span>
    </div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:64px">
      ${w.map(x=>`<div style="flex:1;display:flex;align-items:flex-end;height:100%"><div style="width:100%;height:${Math.max(5,x.km/max*100)}%;border-radius:4px 4px 2px 2px;background:${x.cur?'var(--green)':'var(--surface3)'};${x.cur?'box-shadow:0 0 12px var(--green-glow)':''}"></div></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:9px;color:var(--txt3)"><span>il y a 7 sem.</span><span>cette sem.</span></div>
  </div>`;
}

    </div>
    <div class="prog-line ${prog.cls}"><span class="pi">${ic(prog.ic,18,2.4)}</span><span>${prog.txt}</span></div>

      <div><div style="font-size:12px;color:var(--txt3);margin-bottom:3px">Sport favori ${periodLabel(state.myPeriod)}</div>

/* ============================================================ ONGLET CLASSEMENT */
function rankData(){
  const from=startOf(state.rankPeriod),now=Date.now();
  let group=['me',...friendIds];if(Array.isArray(state.rankSel))group=['me',...state.rankSel];
  let rows,crit;
  if(state.rankCrit==='badges'){
    crit=CRITS.find(c=>c.id==='badges');
    rows=group.map(id=>({id,a:getAthlete(id),val:earnedBadges(id,'semaine').length}));
  }else{
    crit=CRITS.find(c=>c.id===state.rankCrit);
    rows=group.map(id=>{const ag=aggregate(DATA[id].acts,from,now,state.rankSport);return{id,a:getAthlete(id),val:crit.get(ag),ag};});
  }
  rows.sort((x,y)=>y.val-x.val);return{rows,crit};
}

function periodShort(p){return{semaine:'7 jours',mois:'30 jours',annee:'1 an'}[p];}
function sportShort(s){return SPORT_FILTERS.find(f=>f.id===s)?.l||'Tous';}

function podium(rows,crit){
  const slots=[rows[1],rows[0],rows[2]];const cls=['p2','p1','p3'];const rk=['2','1','3'];
  return slots.map((r,i)=>{
    if(!r)return`<div class="pod"></div>`;const isMe=r.id==='me';
    return `<div class="pod ${cls[i]}" onclick="openFriend('${r.id}')">
      ${cls[i]==='p1'?`<div class="crown">${ic('crown',26,0,true)}</div>`:''}
      <div class="pav" style="color:${COL[r.a.col]};background:${COL[r.a.col]}1f">${r.a.ini}<span class="medal">${rk[i]}</span></div>
      <div class="pn" style="${isMe?'color:var(--violet)':''}">${isMe?'Toi':r.a.name.split(' ')[0]}</div>
      <div class="pv">${crit.fmt(r.val)}</div></div>`;
  }).join('');
}
function rankRow(r,i,crit,maxVal){
  const isMe=r.id==='me';const pct=maxVal>0?Math.max(4,r.val/maxVal*100):0;
  const prev=state.prevRankOrder[r.id];let delta='';
  if(prev!==undefined&&prev!==i){const d=prev-i;delta=`<span class="delta ${d>0?'up':'down'}">${d>0?ic('up',9,3):ic('down',9,3)}${Math.abs(d)}</span>`;}
  return `<div class="rrow ${isMe?'me':''} ${i<3?'top':''}" data-id="${r.id}" onclick="openFriend('${r.id}')">
    <div class="rn">${i+1}</div>
    <div class="ra" style="color:${COL[r.a.col]};background:${COL[r.a.col]}1f">${r.a.ini}</div>
    <div class="rmid"><div class="rname">${isMe?'Toi':r.a.name} ${isMe?'<span class="you-pill">VOUS</span>':''} ${delta}</div>
      <div class="bar"><i style="width:${pct}%;background:${isMe?'var(--violet)':i<3?'var(--green)':'var(--txt3)'}"></i></div></div>
    <div class="rval">${crit.fmt(r.val)}</div></div>`;
}

function setCrit(c){state.rankCrit=c;closeSheet();animateRank();}
function setRankPeriod(p){state.rankPeriod=p;animateRank();openRankFilter();}
function setRankSport(s){state.rankSport=s;animateRank();openRankFilter();}
function animateRank(){
  const listEl=document.getElementById('ranklist');if(!listEl){renderClassement();return;}
  const first={};listEl.querySelectorAll('.rrow').forEach(n=>{first[n.dataset.id]=n.getBoundingClientRect().top;});
  const before={};Array.from(listEl.querySelectorAll('.rrow')).forEach((n,i)=>before[n.dataset.id]=i);state.prevRankOrder=before;
  renderClassement();
  const newList=document.getElementById('ranklist');
  newList.querySelectorAll('.rrow').forEach(n=>{const id=n.dataset.id;const last=n.getBoundingClientRect().top;
    if(first[id]!==undefined){const dy=first[id]-last;
      if(Math.abs(dy)>1){n.style.transition='none';n.style.transform=`translateY(${dy}px)`;
        requestAnimationFrame(()=>requestAnimationFrame(()=>{n.style.transition='transform .55s cubic-bezier(.2,.8,.2,1)';n.style.transform='';}));
        n.classList.add('flash');setTimeout(()=>n.classList.remove('flash'),1000);}}});
}
function simulate(){
  const target=pick(friendIds,Math.random);const a=getAthlete(target);
  const m=genMetrics(pick(a.pf.sp,Math.random),mulberry32((Date.now()&0xffff)+a.seed),a.pf);const dt=new Date();
  DATA[target].acts.unshift({...m,id:target+'_sim'+Date.now(),ts:dt.getTime(),date:dt,rseed:Date.now()&0xffff});
  animateRank();toast(`${a.name} vient d'enregistrer une séance`);
}

      <div class="fb">#${rankOf(f.a.id)}</div></div>`).join(''):`<div class="empty">${ic('users',38,1.5)}Tu n'as pas encore d'amis.<br>Invite-les pour lancer le challenge.</div>`}
    </div>
    <div style="padding:0 4px"><button class="btn-out" onclick="openInvite()">${ic('userplus',19,2)} Inviter un ami</button></div>`;
}

/* ============================================================ DÉTAIL ACTIVITÉ */
function genRoute(a){
  const rnd=mulberry32((a.rseed||1)*7+3);const loc=LOCS[Math.floor(rnd()*LOCS.length)];
  const km=a.dist||3;let R=km/(2*Math.PI*111);R=Math.max(.004,Math.min(.085,R));
  const cx=loc.lat+rr(rnd,-.008,.008),cy=loc.lng+rr(rnd,-.008,.008);const baseAng=rr(rnd,0,6.28);
  const N=46,pts=[];const latScale=Math.cos(cx*Math.PI/180)||1;
  for(let i=0;i<=N;i++){const t=i/N*6.283;
    const wob=1+.32*Math.sin(t*3+baseAng)+.16*Math.sin(t*5+baseAng*2)+rr(rnd,-.05,.05);
    const r=R*wob;pts.push([+(cx+Math.sin(t)*r).toFixed(5),+(cy+Math.cos(t)*r/latScale).toFixed(5)]);}
  return{pts,loc};
}
let _actMap=null,_pendingRoute=null;
function openActivity(actId,ownerId){
  const owner=DATA[ownerId];const a=owner.acts.find(x=>x.id===actId);if(!a)return;
  const S=SPORTS[a.sport];const rnd=mulberry32(a.rseed||1);
  const route=S.dist?genRoute(a):null;_pendingRoute=route;
  let visual;
  if(route){const g=`https://www.google.com/maps?q=${route.pts[0][0]},${route.pts[0][1]}`;
    visual=`<div class="map" id="actmap"><div class="ploc">${ic('pin',13,2.2)} ${route.loc.n}</div><div class="pgps">GPS · RIVALTO</div></div>
      <a class="gmaps-link" href="${g}" target="_blank" rel="noopener">${ic('map',16,2)} Voir le secteur sur Google Maps</a>`;}
  else visual=poolGraphic(a);
  const charts=S.dist?`${speedChart(a,rnd)}${S.elev?elevChart(a,rnd):''}`:'';
  let stats=[];
  if(S.dist)stats.push(['Distance',a.dist+' km','ruler']);
  stats.push(['Durée',fmtDur(a.dur),'clock']);
  if(S.dist&&a.sport!=='swim')stats.push(['Vitesse moy.',a.speed+' km/h','gauge']);
  if(S.dist&&a.sport!=='swim')stats.push(['Vitesse max',a.maxSp+' km/h','bolt']);
  if(a.sport==='swim')stats.push(['Allure',fmtPace(60/a.speed)+'/100m','bolt']);
  if(S.pace&&a.sport!=='swim')stats.push(['Allure',fmtPace(60/a.speed)+'/km','bolt']);
  if(S.elev)stats.push(['Dénivelé +','+'+a.elev+' m','hike']);
  stats.push(['Calories',nf(a.cal)+' kcal','flame']);
  stats.push(['Énergie',nf(Math.round(a.cal*4.184))+' kJ','bolt']);
  stats.push(['FC moy.',a.hr+' bpm','heart']);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="ov-bar"><button class="back" onclick="closeOverlay()">${ic('cleft',22,2)}</button>
      <div class="ti">${S.label}<small>${fmtDate(a.date)} · ${a.date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</small></div>
      <div class="act" style="margin:0"><div class="ico" style="width:42px;height:42px">${ic(S.ic,22,2)}</div></div></div>
    <div style="padding:0 16px">${visual}
      <div class="mgrid" style="margin-top:14px">${stats.map(s=>`<div class="metric"><div class="v sm" style="display:flex;align-items:center;gap:7px"><span style="color:var(--txt3)">${ic(s[2],17,2)}</span>${s[1]}</div><div class="l">${s[0]}</div></div>`).join('')}</div>
      ${charts}<div style="height:30px"></div></div>`;
  ov.classList.add('on');ov.scrollTop=0;
  if(route)requestAnimationFrame(()=>initActMap(route));
}
function initActMap(route){
  if(_actMap){try{_actMap.remove();}catch(e){}_actMap=null;}
  const cont=document.getElementById('actmap');if(!cont)return;
  if(!window.L){cont.outerHTML=`<div class="svgmap">${routeSVG(route)}</div>`;return;}
  const map=L.map('actmap',{zoomControl:false,attributionControl:false,scrollWheelZoom:false,dragging:true,doubleClickZoom:false});
  _actMap=map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
  L.polyline(route.pts,{color:'#00ff95',weight:11,opacity:.16,lineCap:'round',lineJoin:'round'}).addTo(map);
  L.polyline(route.pts,{color:'#00ff95',weight:4,opacity:1,lineCap:'round',lineJoin:'round',className:'rl'}).addTo(map);
  L.circleMarker(route.pts[0],{radius:6,color:'#00ff95',weight:3,fillColor:'#08090c',fillOpacity:1}).addTo(map);
  L.circleMarker(route.pts[route.pts.length-1],{radius:6,color:'#ff2e97',weight:2,fillColor:'#ff2e97',fillOpacity:1}).addTo(map);
  try{map.fitBounds(L.latLngBounds(route.pts).pad(.18));}catch(e){}
  setTimeout(()=>{try{map.invalidateSize();map.fitBounds(L.latLngBounds(route.pts).pad(.18));}catch(e){}},80);
}
function routeSVG(route){
  const pts=route.pts;const lats=pts.map(p=>p[0]),lngs=pts.map(p=>p[1]);
  const minLa=Math.min(...lats),maxLa=Math.max(...lats),minLo=Math.min(...lngs),maxLo=Math.max(...lngs);
  const W=440,H=210,pad=26;
  const sx=v=>pad+(v-minLo)/((maxLo-minLo)||1)*(W-2*pad);
  const sy=v=>H-pad-(v-minLa)/((maxLa-minLa)||1)*(H-2*pad);
  const d=pts.map((p,i)=>(i?'L':'M')+sx(p[1]).toFixed(0)+' '+sy(p[0]).toFixed(0)).join(' ');
  const s=[sx(pts[0][1]),sy(pts[0][0])],e=[sx(pts[pts.length-1][1]),sy(pts[pts.length-1][0])];
  return `<div class="gl"></div><div class="ploc">${ic('pin',13,2.2)} ${route.loc.n}</div>
    <svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice">
      <path d="${d}" fill="none" stroke="#00ff95" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 6px rgba(0,255,149,.7))"/>
      <circle cx="${s[0]}" cy="${s[1]}" r="6" fill="#08090c" stroke="#00ff95" stroke-width="2.5"/>
      <circle cx="${e[0]}" cy="${e[1]}" r="6" fill="#ff2e97" stroke="#08090c" stroke-width="2"/></svg>`;
}
function poolGraphic(a){
  const laps=Math.max(4,Math.round(a.dist*1000/50));
  return `<div class="svgmap" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="gl"></div>
    <div style="color:var(--cyan);filter:drop-shadow(0 0 8px rgba(45,226,255,.5))">${ic(SPORTS[a.sport]?.ic||'swim',54,1.6)}</div>
    <div style="font-family:'Orbitron';font-weight:700;font-size:15px;color:var(--cyan);z-index:1">${a.sport==='swim'?laps+' longueurs (50m)':fmtDur(a.dur)+" d'effort"}</div></div>`;
}
function miniChart(vals,color,W=420,H=90){
  const max=Math.max(...vals),min=Math.min(...vals),rng=max-min||1;const step=W/(vals.length-1);
  const pts=vals.map((v,i)=>[i*step,H-8-((v-min)/rng)*(H-20)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(0)+' '+p[1].toFixed(0)).join(' ');
  const area=`M0 ${H} `+pts.map(p=>'L'+p[0].toFixed(0)+' '+p[1].toFixed(0)).join(' ')+` L${W} ${H} Z`;
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${area}" fill="${color}" opacity="0.12"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function speedChart(a,rnd){const n=18,vals=[];for(let i=0;i<n;i++)vals.push(a.speed*rr(rnd,.72,1.18));
  return `<div class="chart-box"><div class="ct">Vitesse <span>${a.speed} km/h moy.</span></div>${miniChart(vals,'#00ff95')}</div>`;}
function elevChart(a,rnd){const n=18,vals=[];let h=rr(rnd,80,200);for(let i=0;i<n;i++){h+=rr(rnd,-22,26);vals.push(h);}
  return `<div class="chart-box"><div class="ct">Profil altimétrique <span>+${a.elev} m D+</span></div>${miniChart(vals,'#2de2ff')}</div>`;}

/* ============================================================ DÉTAIL AMI */
function openFriend(id){
  const owner=DATA[id];const a=owner.a;const isMe=id==='me';
  const from=startOf('semaine'),now=Date.now();const ag=aggregate(owner.acts,from,now,'all');
  const recent=owner.acts.filter(x=>x.ts>=startOf('mois')).slice(0,8);
  const earned=earnedBadges(id,'semaine');
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="ov-bar"><button class="back" onclick="closeOverlay()">${ic('cleft',22,2)}</button>
      <div class="ti">${isMe?'Mon profil':a.name}<small>Athlète Rivalto</small></div></div>
    <div style="padding:0 16px">
      <div style="display:flex;align-items:center;gap:16px;padding:8px 4px 20px">
        <div style="width:64px;height:64px;border-radius:50%;border:2px solid ${COL[a.col]};display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:700;font-size:22px;color:${COL[a.col]};background:${COL[a.col]}1a;box-shadow:0 0 22px ${COL[a.col]}40">${a.ini}</div>
        <div><div style="font-size:20px;font-weight:700">${isMe?'Toi':a.name}</div>
          <div style="font-size:12px;color:var(--txt3);margin-top:2px">${ag.sessions} séance${ag.sessions>1?'s':''} cette semaine · ${ag.km} km</div></div></div>
      <div class="eyebrow">Cette semaine</div>
      <div class="mgrid" style="margin:0 4px 14px">
        <div class="metric"><div class="v sm">${ag.km}<small>km</small></div><div class="l">Distance</div></div>
        <div class="metric alt"><div class="v sm">${nf(ag.cal)}</div><div class="l">kcal</div></div>
        <div class="metric"><div class="v sm">${fmtDur(ag.dur)}</div><div class="l">Durée</div></div>
        <div class="metric alt2"><div class="v sm">${ag.elev?'+'+nf(ag.elev):0}<small>m</small></div><div class="l">Dénivelé</div></div></div>
      ${earned.length?`<div class="eyebrow">Distinctions de la semaine · ${earned.length}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;padding:0 4px 14px">${earned.map(bid=>{const b=BADGES.find(x=>x.id===bid);return `<div style="display:flex;align-items:center;gap:7px;background:rgba(0,255,149,.1);border:.5px solid rgba(0,255,149,.3);border-radius:20px;padding:7px 13px;font-size:12px;font-weight:600;color:var(--green)">${ic(b.ic,15,2)}${b.n}</div>`;}).join('')}</div>`:''}
      <div class="eyebrow">Séances récentes</div>
      <div style="padding:0 4px">${recent.length?recent.map(x=>actRow(x,id)).join(''):`<div class="empty" style="padding:30px">${ic('activity',32,1.5)}Aucune séance récente.</div>`}</div>
      <div style="height:30px"></div></div>`;
  ov.classList.add('on');ov.scrollTop=0;
}
function closeOverlay(){if(_actMap){try{_actMap.remove();}catch(e){}_actMap=null;}
  const ov=document.getElementById('overlay');ov.classList.remove('on');setTimeout(()=>ov.innerHTML='',300);}

/* ============================================================ INVITER */
function openInvite(){
  const sb=document.getElementById('sheet');
  sb.innerHTML=`<div class="sheet"><div class="grip"></div>
    <h3>Inviter un ami</h3><p class="s">Partage ton lien Rivalto ou cherche quelqu'un déjà inscrit.</p>
    <div class="eyebrow" style="margin:0 0 10px"><span style="color:var(--green)">${ic('link',12,2)}</span> Ton lien d'invitation</div>
    <div class="linkbox"><input id="invlink" value="rivalto.app/join/QL-7F3K" readonly>
      <button onclick="copyLink()">${ic('copy',14,2)} Copier</button></div>
    <p style="font-size:12px;color:var(--txt3)">Envoie-le par SMS, WhatsApp, Teams, mail… Ton ami se connecte avec Strava et rejoint ta liste.</p>
    <div class="divider">ou</div>
    <div class="eyebrow" style="margin:0 0 10px"><span style="color:var(--green)">${ic('search',12,2)}</span> Rechercher un athlète</div>
    <div class="searchbox">${ic('search',18,2)}<input placeholder="Pseudo ou nom Strava…" oninput="filterSugg(this.value)"></div>
    <div id="sugglist">${POOL.map(p=>suggRow(p)).join('')}</div><div style="height:6px"></div></div>`;
  sb.classList.add('on');sb.onclick=e=>{if(e.target===sb)closeSheet();};
}
function suggRow(p){const added=friendIds.includes(p.id);
  return `<div class="sugg" data-name="${p.name.toLowerCase()}"><div class="sa" style="color:${COL[p.col]};background:${COL[p.col]}1f">${p.ini}</div>
    <div class="smid"><div class="sn">${p.name}</div><div class="ss">Athlète Strava</div></div>
    <button class="addb ${added?'done':''}" id="add-${p.id}" onclick="addFriend('${p.id}')">${added?ic('check',14,2.5)+' Ajouté':ic('plus',14,2.5)+' Ajouter'}</button></div>`;
}
function filterSugg(q){q=q.toLowerCase();document.querySelectorAll('#sugglist .sugg').forEach(n=>{n.style.display=n.dataset.name.includes(q)?'flex':'none';});}
function addFriend(pid){
  if(friendIds.includes(pid))return;const p=POOL.find(x=>x.id===pid);const seed=900+POOL.indexOf(p)*17;
  const a={id:pid,name:p.name,ini:p.ini,col:p.col,seed,pf:{freq:rr(mulberry32(seed),.4,.75),sp:['run','ride','trail','workout'],vol:rr(mulberry32(seed+1),.8,1.4),el:rr(mulberry32(seed+2),.6,1.6),it:rr(mulberry32(seed+3),.9,1.3)}};
  DATA[pid]={a,acts:genAthlete(a)};friendIds.push(pid);
  const btn=document.getElementById('add-'+pid);if(btn){btn.className='addb done';btn.innerHTML=ic('check',14,2.5)+' Ajouté';}
  toast(`${p.name} a rejoint ton classement`);renderAmis();renderActivite();
}
function copyLink(){const v=document.getElementById('invlink').value;navigator.clipboard?.writeText(v).catch(()=>{});toast('Lien copié dans le presse-papier');}
function closeSheet(){const sb=document.getElementById('sheet');sb.classList.remove('on');setTimeout(()=>sb.innerHTML='',280);}

/* ---------- toast ---------- */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}

/* ============================================================ PWA */
function appIcon(){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="#08090c"/><circle cx="256" cy="256" r="150" fill="none" stroke="#00ff95" stroke-width="14"/><path d="M278 130 196 286h70l-14 96 118-160h-86l16-92z" fill="#00ff95"/></svg>`;
  return 'data:image/svg+xml;base64,'+btoa(svg);
}
function initPWA(){
  const icon=appIcon();
  const manifest={name:'Rivalto — Athletic League',short_name:'Rivalto',start_url:'.',display:'standalone',background_color:'#08090c',theme_color:'#08090c',orientation:'portrait',icons:[{src:icon,sizes:'512x512',type:'image/svg+xml',purpose:'any'},{src:icon,sizes:'512x512',type:'image/svg+xml',purpose:'maskable'}]};
  const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));document.head.appendChild(ml);
  const al=document.createElement('link');al.rel='apple-touch-icon';al.href=icon;document.head.appendChild(al);
  if('serviceWorker'in navigator){
    const sw=`const C='rivalto-v2';self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>{const f=fetch(e.request).then(n=>{c.put(e.request,n.clone());return n}).catch(()=>r);return r||f})))});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
  }
}
